  ".coverage",
  ".git/",
  ".github/",
  ".idea/",
  ".vscode/",
  ".DS_Store",
  "Thumbs.db",
  "*.pyc",
  "*.pyo",
  "*.pyd",
  "*.zip",
  "*.log",
  "*.egg-info/",
  "*.sublime-*",
  ".gitignore",
  ".gitattributes",
  "build.bat",
  "build.sh",
  "diagnostic.bat",
  "install.bat",
  "run.bat",
  "docs/",
  "README_datapipeline.md",
  "ui/",
  "webui/package_release.py",
  "webui/setup.py",
  "venv/",
  ".pip_cache/",
  ".hf_cache/",
  "workspace/",
