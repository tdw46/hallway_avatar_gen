schema_version = "1.0.0"

id = "hallway_avatar_gen"
version = "0.1.0"
name = "Hallway Avatar Gen"
tagline = "Native web UI for avatar layer decomposition in the 3D Viewport"
maintainer = "Tyler Walker"
type = "add-on"

website = "https://github.com/shitagaki-lab/see-through"

tags = ["Animation", "Compositing", "Pipeline"]

